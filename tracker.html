<!DOCTYPE html>
<html lang="en" class="theme-navy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="theme-color" content="#1b3a6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Health Tracker</title>
<link rel="manifest" href="/health/manifest-tracker.json">
<link rel="stylesheet" href="themes.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* tracker-specific aliases on top of themes.css variables */
    --accent:   var(--primary);
    --accent-d: var(--primary);
    --faint:    var(--muted);
    --green-d:  var(--green);
    --amber:    #b8860b;
    --border-h: var(--border);
    --shadow-h: var(--shadow-heavy);
    --safe-b:   env(safe-area-inset-bottom, 0px);
    --safe-t:   env(safe-area-inset-top, 0px);
    --sans:     -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    --mono:     ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }

  html.theme-earth {
    --accent-d: #6f4828;
    --faint:    #b3a684;
    --green-d:  #3f5b43;
    --border-h: #d4c8ab;
  }
  html.theme-navy {
    --accent-d: #163060;
    --faint:    #7090b0;
    --green-d:  #155039;
    --border-h: #b8c8dc;
  }
  html.theme-pastel {
    --accent-d: #b85a7e;
    --faint:    #b898a0;
    --green-d:  #3f5b43;
    --border-h: #e0b8c4;
  }

  html { -webkit-text-size-adjust: 100%; font-size: 16px; }
  [hidden] { display: none !important; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    padding-top: var(--safe-t);
    padding-bottom: calc(64px + var(--safe-b));
    -webkit-tap-highlight-color: transparent;
  }
  body.has-timer { padding-bottom: calc(180px + var(--safe-b)); }

  button, input, select { font: inherit; color: inherit; }
  button { background: none; border: none; cursor: pointer; touch-action: manipulation; }
  a { color: var(--accent); text-decoration: none; }
  a:active { opacity: 0.6; }

  /* ── Top bar ─────────────────────────────────────────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-height: 52px;
  }
  .topbar h1 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent-d);
    letter-spacing: -0.01em;
  }
  .topbar .sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .topbar-actions { display: flex; gap: 6px; align-items: center; }
  .iconbtn {
    min-width: 40px;
    height: 40px;
    padding: 0 10px;
    border-radius: 8px;
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .iconbtn:active { background: color-mix(in srgb, var(--accent) 12%, transparent); }

  /* ── View container ──────────────────────────────────── */
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 12px 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .card.subtle {
    background: var(--paper);
    box-shadow: none;
  }
  .card h2 {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent-d);
    margin-bottom: 8px;
  }
  .card h3 {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .card .note {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.55;
  }

  /* ── Buttons ─────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 0 18px;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-weight: 600;
    font-size: 1rem;
    border: 1px solid var(--accent-d);
    transition: transform 0.05s ease, background 0.15s ease;
  }
  .btn:active { transform: scale(0.98); background: var(--accent-d); }
  .btn[disabled] { opacity: 0.45; pointer-events: none; }
  .btn.secondary { background: var(--paper); color: var(--accent-d); border-color: var(--border-h); }
  .btn.secondary:active { background: var(--border); }
  .btn.ghost { background: transparent; color: var(--accent-d); border-color: transparent; }
  .btn.danger { background: var(--red); border-color: #8e2a1f; }
  .btn.block { width: 100%; }
  .btn.sm { min-height: 36px; padding: 0 12px; font-size: 0.85rem; }

  /* ── Inputs ──────────────────────────────────────────── */
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 10px;
  }
  .field label {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 600;
  }
  .field input, .field select {
    background: var(--card);
    border: 1px solid var(--border-h);
    border-radius: 8px;
    padding: 12px 12px;
    font-size: 1rem;
    min-height: 48px;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .input-inline {
    background: var(--paper);
    border: 1px solid var(--border-h);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 1rem;
    width: 80px;
    text-align: center;
    min-height: 40px;
  }
  .input-inline:focus { outline: none; border-color: var(--accent); }
  .input-inline[disabled] { background: var(--bg); color: var(--muted); }

  /* ── Setup view specific ─────────────────────────────── */
  .ex-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .ex-row:last-child { border-bottom: none; }
  .ex-row .ex-name { flex: 1; }
  .ex-row .ex-name strong { font-weight: 600; }
  .ex-row .ex-name small { display: block; color: var(--muted); font-size: 0.78rem; }
  .projection-table {
    width: 100%;
    margin-top: 8px;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .projection-table th, .projection-table td {
    padding: 4px 6px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .projection-table th {
    background: var(--paper);
    color: var(--muted);
    font-weight: 600;
    font-size: 0.75rem;
  }
  .proj-label {
    color: var(--accent);
    font-size: 0.82rem;
    font-weight: 600;
    padding: 4px 0;
  }

  /* ── Day view ────────────────────────────────────────── */
  .day-header {
    margin-bottom: 12px;
  }
  .day-header .week-label {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .day-header .day-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 2px 0;
    color: var(--accent-d);
  }
  .day-header .day-date { font-size: 0.85rem; color: var(--muted); }
  .day-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin: 8px 0 14px;
  }
  .day-nav button { min-width: 44px; }

  .block { margin-bottom: 18px; }
  .block-title {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0 4px;
    margin-bottom: 6px;
  }
  .block-meta {
    font-size: 0.75rem;
    color: var(--faint);
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    margin-left: 6px;
  }

  .exercise {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 12px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
  }
  .exercise.superset-pair { border-left: 3px solid var(--accent); }
  .ex-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .ex-head .name { font-weight: 700; font-size: 1rem; }
  .ex-head .meta { color: var(--muted); font-size: 0.82rem; white-space: nowrap; }
  .ex-cue { color: var(--muted); font-size: 0.82rem; line-height: 1.5; margin: 4px 0 8px; }
  .ex-tempo {
    display: inline-block;
    font-size: 0.75rem;
    color: var(--accent-d);
    background: var(--paper);
    border: 1px solid var(--border-h);
    border-radius: 6px;
    padding: 2px 8px;
    font-family: var(--mono);
    font-weight: 600;
    margin: 4px 0 4px;
    letter-spacing: 0.02em;
  }
  .ex-tempo .lbl {
    font-family: var(--sans);
    color: var(--muted);
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-right: 6px;
  }
  .ex-weight-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin: 8px 0;
    padding: 8px 10px;
    background: var(--paper);
    border-radius: 8px;
  }
  .ex-weight-row label { font-size: 0.85rem; color: var(--muted); flex: 1; }
  .ex-weight-row .unit { font-size: 0.85rem; color: var(--muted); }
  .ex-weight-row .ex-last {
    flex-basis: 100%;
    font-size: 0.75rem;
    color: var(--muted);
    padding-left: 0;
  }
  .ex-weight-row .ex-last strong { color: var(--accent-d); font-weight: 700; }

  .set-list { list-style: none; }
  .set-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 8px 0;
    border-top: 1px dashed var(--border);
  }
  .set-row:first-child { border-top: none; }
  .set-row .set-num {
    width: 60px;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 600;
  }
  .set-row .set-reps {
    flex: 1;
    font-size: 0.9rem;
    color: var(--text);
  }
  .set-row .set-action {
    min-height: 48px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    color: var(--accent-d);
    background: var(--card);
    font-weight: 600;
    font-size: 0.88rem;
    min-width: 120px;
  }
  .set-row .set-action.active {
    background: var(--accent);
    color: white;
  }
  .set-row .set-action.done {
    background: var(--green);
    border-color: var(--green-d);
    color: white;
  }
  .set-row.done {
    color: var(--muted);
  }
  .set-row .set-stat {
    font-size: 0.78rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    min-width: 78px;
    text-align: right;
  }
  .set-rpe {
    flex-basis: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 70px;
    margin-top: -2px;
  }
  .set-rpe label {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .set-rpe select {
    background: var(--paper);
    border: 1px solid var(--border-h);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 0.85rem;
    min-height: 36px;
    color: var(--text);
  }
  .set-rpe select:focus { outline: none; border-color: var(--accent); }

  /* Warm-up: single block-level timer, no per-set buttons */
  .warmup-card .ex-cue { margin: 0; }
  .warmup-list {
    list-style: none;
    margin: 6px 0 10px;
  }
  .warmup-list li {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 6px 0;
    border-top: 1px dashed var(--border);
    font-size: 0.9rem;
  }
  .warmup-list li:first-child { border-top: none; }
  .warmup-list .w-spec {
    color: var(--muted);
    font-size: 0.82rem;
    white-space: nowrap;
  }
  .warmup-btn.active {
    background: var(--accent);
    color: white;
  }
  .warmup-btn.done {
    background: var(--green);
    border-color: var(--green-d);
    color: white;
  }

  .day-finish {
    margin-top: 18px;
    margin-bottom: 28px;
  }

  /* ── Timer (sticky bottom) ───────────────────────────── */
  .timer-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 64px;
    bottom: calc(64px + var(--safe-b));
    background: var(--card);
    border-top: 3px solid var(--amber);
    box-shadow: var(--shadow-h);
    z-index: 90;
    padding: 12px 16px;
    transition: border-top-color 0.3s ease;
  }
  .timer-bar.green { border-top-color: var(--green); }
  .timer-bar.red { border-top-color: var(--red); }
  .timer-bar.set-active { border-top-color: var(--accent); }

  .timer-bar .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .timer-bar .label {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .timer-bar .ex { font-weight: 700; font-size: 0.95rem; }
  .timer-bar .digits {
    font-family: var(--mono);
    font-size: 1.9rem;
    font-weight: 700;
    color: var(--amber);
    font-variant-numeric: tabular-nums;
  }
  .timer-bar.green .digits { color: var(--green-d); }
  .timer-bar.red .digits { color: var(--red); animation: pulse 1.2s ease-in-out infinite; }
  .timer-bar.set-active .digits { color: var(--accent-d); }
  .timer-bar .planned { font-size: 0.78rem; color: var(--muted); }
  .timer-bar .controls {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  /* ── Resting-state big display ───────────────────────── */
  .timer-bar .rest-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 4px 0 2px;
  }
  .timer-bar .rest-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .timer-bar .rest-label {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .timer-bar .rest-digits {
    font-family: var(--mono);
    font-size: 2.8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--red);
    line-height: 1;
  }
  .timer-bar.green .rest-digits { color: var(--green-d); }
  .timer-bar.set-active .rest-digits { color: var(--accent-d); }
  .timer-bar.set-active .rest-bpm   { color: var(--accent-d); }
  .timer-bar .set-info-strip {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .timer-bar .set-info-strip .label { flex-shrink: 0; }
  .timer-bar .set-info-strip .ex {
    font-weight: 700;
    font-size: 0.88rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .timer-bar .rest-bpm {
    font-family: var(--mono);
    font-size: 2.8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    line-height: 1;
  }
  .bpm-green { color: var(--green-d) !important; }
  .bpm-red   { color: var(--red)     !important; }

  .timer-bar .set-details-strip {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 14px;
    padding: 2px 0 6px;
  }
  .timer-bar .detail-reps {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--fg);
  }
  .timer-bar .detail-tempo {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--muted);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  /* ── Bottom nav ──────────────────────────────────────── */
  .bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--paper);
    border-top: 1px solid var(--border);
    padding-bottom: var(--safe-b);
    z-index: 100;
    display: flex;
  }
  .bottom-nav a {
    flex: 1;
    text-align: center;
    padding: 10px 6px 12px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.02em;
    border-top: 2px solid transparent;
  }
  .bottom-nav a .icon { display: block; font-size: 1.1rem; margin-bottom: 2px; }
  .bottom-nav a.active { color: var(--accent); border-top-color: var(--accent); background: var(--bg); }

  /* ── History ─────────────────────────────────────────── */
  .hist-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
  }
  .hist-row summary {
    list-style: none;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .hist-row summary::-webkit-details-marker { display: none; }
  .hist-row .h-date { font-weight: 700; font-size: 0.95rem; }
  .hist-row .h-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .hist-row .h-tag {
    background: var(--paper);
    border: 1px solid var(--border-h);
    color: var(--accent-d);
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 700;
  }
  .hist-detail {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .hist-detail .h-ex {
    margin: 6px 0;
  }
  .hist-detail .h-ex .h-ex-name { font-weight: 600; }
  .hist-detail .h-ex .h-sets {
    color: var(--muted);
    font-size: 0.8rem;
    margin-left: 6px;
    font-variant-numeric: tabular-nums;
  }

  .hist-actions {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 32px 16px;
    font-size: 0.9rem;
  }

  /* ── Misc ────────────────────────────────────────────── */
  .pill {
    display: inline-block;
    background: var(--paper);
    border: 1px solid var(--border);
    color: var(--accent-d);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
    margin-left: 6px;
  }
  hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .row { display: flex; align-items: center; gap: 10px; }
  .row.gap-sm { gap: 6px; }
  .grow { flex: 1; }
  .text-muted { color: var(--muted); }
  .text-sm { font-size: 0.85rem; }
  .text-xs { font-size: 0.75rem; }
  .mt-1 { margin-top: 6px; } .mt-2 { margin-top: 12px; } .mb-1 { margin-bottom: 6px; } .mb-2 { margin-bottom: 12px; }
  .drive-status { font-size: 0.78rem; color: var(--muted); min-height: 1.2em; margin-top: 8px; }

  /* ── Heart-rate ──────────────────────────────────────────── */
  .hr-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 999px;
    letter-spacing: 0.01em;
  }
  .hr-badge.resting { background: var(--green); }
  .hr-connect-btn {
    font-size: 0.75rem;
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 8px;
    border: 1px solid var(--border-h);
    background: var(--paper);
    font-weight: 600;
  }
  .hr-connect-btn:active { background: var(--border); }
  .hr-connect-btn.connected { color: var(--accent); border-color: var(--accent); }
  .hr-inline {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 600;
    min-width: 48px;
    text-align: right;
  }
  .h-hr {
    font-size: 0.75rem;
    color: var(--green-d);
    margin-top: 2px;
    font-weight: 600;
  }

  /* ── Cardio session dashboard ────────────────────────── */
  .cardio-hr-card {
    display: flex;

/* Per-exercise progression strategies.
   "default" → W1 = baseline,  W2 = +inc,  W3 = round(W2*0.80, step),  W4 = same as W3.
   "tgu"     → W1 = baseline,  W2 = +4,    W3 = baseline,              W4 = baseline.
   "swing-finisher" → W1=base, W2=+4, W3=base, W4=max(0, base-4).      */
function projectedWeight(baseline, weightType, week, strategy) {
  if (baseline == null || baseline === '' || weightType === 'none') return null;
  const b = Number(baseline);
  if (!isFinite(b)) return null;
  const inc = weightType === 'kb' ? 4 : 2;
  const step = weightType === 'kb' ? 4 : 1;
  const round = (n) => Math.max(0, Math.round(n / step) * step);
  if (strategy === 'tgu') {
    if (week === 2) return b + 4;
    return b;
  }
  if (strategy === 'swing-finisher') {
    if (week === 2) return b + 4;
    if (week === 4) return Math.max(0, b - 4);
    return b;
  }
  if (week === 1) return b;
  if (week === 2) return b + inc;
  const w2 = b + inc;
  return round(w2 * 0.80);
}

/* List of weighted exercises that need a Week-1 baseline.
   Walks DAYS, dedupes by exercise.id, keeps only weightType ≠ 'none'.       */
function listWeightedExercises(prog) {
  prog = prog || getActiveProgram();
  const seen = new Set();
  const out = [];
  for (const d of prog.days) {
    if (!d.blocks) continue;
    for (const b of d.blocks) {
      if (!b.exercises) continue;
      for (const ex of b.exercises) {
        if (!ex.id || ex.weightType === 'none' || ex.weightType == null) continue;
        if (seen.has(ex.id)) continue;
        seen.add(ex.id);
        out.push({
          id: ex.id, name: ex.name, weightType: ex.weightType,
          dayLabel: `Day ${d.day} — ${d.name.split('—')[1] ? d.name.split('—')[1].trim() : d.name}`,
          progression: ex.progression || 'default',
        });
      }
    }
  }
  return out;
}

   PROGRAMME REGISTRY
   Built-in programmes are defined here. Imported programmes are
   stored in Storage.importedPrograms and loaded at runtime.
   ════════════════════════════════════════════════════════════════ */
const BUILT_IN_PROGRAMS = [
  {
    id: 'strength-40-male',
    name: 'Strength + Cardio (40s, Male)',
    description: '4-week progressive overload cycle for adults 40–50. Mon–Fri strength, Sat rucking, Sun active recovery.',
    weeks: WEEKS,
    weekDefaultReps: WEEK_DEFAULT_REPS,
    days: DAYS,
  },
];

function getActiveProgram() {
  const cfg = Storage.getConfig() || {};
  const id = cfg.programId;
  if (id) {
    const builtin = BUILT_IN_PROGRAMS.find(p => p.id === id);
    if (builtin) return builtin;
    const imp = Storage.getImportedProgram(id);
    if (imp) return imp;
  }
  return BUILT_IN_PROGRAMS[0];
}

/* ════════════════════════════════════════════════════════════════
   STORAGE  (multi-profile: health:v1)
   ════════════════════════════════════════════════════════════════ */
const STORAGE_KEY = 'health:v1';

const Storage = {
  _data: null,

  _defaultData() {
    return {
      profiles: {
        p1: { name: 'Person 1', gender: 'male' },
        p2: { name: 'Person 2', gender: 'female' },
      },
      activeProfile: 'p1',
      importedPrograms: {},
      perProfile: {
        p1: { config: null, baselines: {}, sessions: {}, doctorVisits: [], healthReports: [] },
        p2: { config: null, baselines: {}, sessions: {}, doctorVisits: [], healthReports: [] },
      },
    };
  },

  _ensureProfile(id) {
    const d = this._data;
    if (!d.perProfile[id]) {
      d.perProfile[id] = { config: null, baselines: {}, sessions: {}, doctorVisits: [], healthReports: [] };
    }
    const p = d.perProfile[id];
    if (!p.baselines) p.baselines = {};
    if (!p.sessions) p.sessions = {};
    if (!p.doctorVisits) p.doctorVisits = [];
    if (!p.healthReports) p.healthReports = [];
  },

  load() {
    if (this._data) return this._data;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      this._data = raw ? JSON.parse(raw) : this._defaultData();
    } catch (e) {
      console.error('Storage parse failed, resetting', e);
      this._data = this._defaultData();
    }
    if (!this._data.profiles) this._data.profiles = { p1: { name: 'Person 1', gender: 'male' }, p2: { name: 'Person 2', gender: 'female' } };
    if (!this._data.perProfile) this._data.perProfile = {};
    if (!this._data.activeProfile) this._data.activeProfile = 'p1';
    if (!this._data.importedPrograms) this._data.importedPrograms = {};
    this._ensureProfile('p1');
    this._ensureProfile('p2');
    return this._data;
  },

  save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(this._data)); },

  /* ── Profile management ─────────────────────────────── */
  getActiveProfile() { return this.load().activeProfile || 'p1'; },
  setActiveProfile(id) { this.load().activeProfile = id; this.save(); },
  getProfiles() { return this.load().profiles; },
  setProfileNames(n1, n2) {
    const d = this.load();
    d.profiles.p1.name = n1 || 'Person 1';
    d.profiles.p2.name = n2 || 'Person 2';
    this.save();
  },

  _pd(pid) {
    const id = pid || this.getActiveProfile();
    this._ensureProfile(id);
    return this.load().perProfile[id];
  },

  /* ── Imported programmes ────────────────────────────── */
  getImportedPrograms() { return this.load().importedPrograms || {}; },
  getImportedProgram(id) { return (this.load().importedPrograms || {})[id] || null; },
  saveImportedProgram(prog) { this.load().importedPrograms[prog.id] = prog; this.save(); },
  deleteImportedProgram(id) { delete this.load().importedPrograms[id]; this.save(); },

  /* ── Workout config ─────────────────────────────────── */
  getConfig(pid) { return this._pd(pid).config; },
  setConfig(cfg, pid) { this._pd(pid).config = cfg; this.save(); },

  /* ── Exercise baselines ─────────────────────────────── */
  getBaseline(cycle, exerciseId, pid) {
    return (this._pd(pid).baselines[cycle] || {})[exerciseId];
  },
  getBaselines(cycle, pid) { return this._pd(pid).baselines[cycle] || {}; },
  setBaselines(cycle, weights, pid) { this._pd(pid).baselines[cycle] = weights; this.save(); },

  /* ── Workout sessions ───────────────────────────────── */
  getSession(dateStr, pid) { return this._pd(pid).sessions[dateStr] || null; },
  upsertSession(dateStr, session, pid) { this._pd(pid).sessions[dateStr] = session; this.save(); },
  deleteSession(dateStr, pid) { delete this._pd(pid).sessions[dateStr]; this.save(); },
  listSessions(pid) {
    return Object.entries(this._pd(pid).sessions)
      .map(([date, s]) => ({ date, ...s }))
      .sort((a, b) => b.date.localeCompare(a.date));
  },

  /* ── Doctor visits ──────────────────────────────────── */
  getDoctorVisits(pid) {
    return [...this._pd(pid).doctorVisits].sort((a, b) => b.date.localeCompare(a.date));
  },
  addDoctorVisit(visit, pid) {
    visit.id = visit.id || (Date.now().toString(36) + Math.random().toString(36).slice(2, 6));
    this._pd(pid).doctorVisits.push(visit);
    this.save();
  },
  deleteDoctorVisit(visitId, pid) {
    const p = this._pd(pid);
    p.doctorVisits = p.doctorVisits.filter(v => v.id !== visitId);
    this.save();
  },

  /* ── Health reports ─────────────────────────────────── */
  getHealthReports(pid) {
    return [...this._pd(pid).healthReports].sort((a, b) => b.date.localeCompare(a.date));
  },
  addHealthReport(report, pid) {
    report.id = report.id || (Date.now().toString(36) + Math.random().toString(36).slice(2, 6));
    this._pd(pid).healthReports.push(report);
    this.save();
  },
  deleteHealthReport(reportId, pid) {
    const p = this._pd(pid);
    p.healthReports = p.healthReports.filter(r => r.id !== reportId);
    this.save();
  },

  reset() { localStorage.removeItem(STORAGE_KEY); this._data = null; },
};

/* ── Migrate from old tracker:v1 format ─────────────────────────── */
function migrateIfNeeded() {
  const old = localStorage.getItem('tracker:v1');
  if (old && !localStorage.getItem(STORAGE_KEY)) {
    try {
      const { config, baselines, sessions } = JSON.parse(old);
      const newData = Storage._defaultData();
      newData.perProfile.p1 = {
        config: config || null,
        baselines: baselines || {},
        sessions: sessions || {},
        doctorVisits: [],
        healthReports: [],
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(newData));
    } catch (e) {
      console.error('Migration from tracker:v1 failed:', e);
    }
  }
}

/* Most recent prior session that logged actualWeight for this exercise.
   Used to surface a "last: X kg (W1D1)" hint on the Today view so a lifter
   can autoregulate without leaving the screen. Sessions are already returned
   newest-first by listSessions(). */
function getLastSessionWeight(exId, beforeDateISO) {
  if (!exId) return null;
  for (const s of Storage.listSessions()) {
    if (s.date >= beforeDateISO) continue;
    const ex = (s.exercises || {})[exId];
    if (ex && ex.actualWeight != null) {
      return { weight: ex.actualWeight, date: s.date, week: s.week, day: s.day };
    }
  }
  return null;
}

/* ════════════════════════════════════════════════════════════════
   EXPORT / IMPORT
   ════════════════════════════════════════════════════════════════ */
function exportData() {
  const data = localStorage.getItem(STORAGE_KEY) || '{}';
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `health-tracker-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      const isNew = !!parsed.perProfile;
      const isLegacy = parsed.config !== undefined || parsed.sessions || parsed.baselines;
      if (!isNew && !isLegacy) {
        alert('This file does not look like a valid backup.');
        return;
      }
      if (!confirm('This will replace all current data. Continue?')) return;
      if (isNew) {
        localStorage.setItem(STORAGE_KEY, e.target.result);
      } else {
        const nd = Storage._defaultData();
        nd.perProfile.p1 = {
          config: parsed.config || null,
          baselines: parsed.baselines || {},
          sessions: parsed.sessions || {},
          doctorVisits: [],
          healthReports: [],
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(nd));
      }
      location.reload();
    } catch {
      alert('Could not read the file — make sure it is a valid JSON backup.');
    }
    fileInput.value = '';
  };
  reader.readAsText(file);
}

function importProgram(fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const prog = JSON.parse(e.target.result);
      if (!prog.id || !prog.name || !prog.weeks || !prog.weekDefaultReps || !Array.isArray(prog.days)) {
        alert('Invalid programme file. Must have: id, name, weeks, weekDefaultReps, days.');
        return;
      }
      if (BUILT_IN_PROGRAMS.some(p => p.id === prog.id)) {
        alert(`"${prog.id}" matches a built-in programme ID. Use a different id in your JSON.`);
        return;
      }
      Storage.saveImportedProgram(prog);
      const cfg = Storage.getConfig() || { startDate: todayISO(), cycleNumber: 1 };
      Storage.setConfig({ ...cfg, programId: prog.id });
      renderSetup(false);
    } catch {
      alert('Could not read the file — make sure it is valid JSON.');
    }
    fileInput.value = '';
  };
  reader.readAsText(file);
}

/* ════════════════════════════════════════════════════════════════
   GOOGLE DRIVE SYNC
   ════════════════════════════════════════════════════════════════ */
const DriveSync = (() => {
  const CFG_KEY = 'tracker:drive-config';

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem(CFG_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveConfig(updates) {
    localStorage.setItem(CFG_KEY, JSON.stringify({ ...loadConfig(), ...updates }));
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
      const s = document.createElement('script');
      s.src = src; s.onload = resolve;
      s.onerror = () => reject(new Error('Failed to load: ' + src));
      document.head.appendChild(s);
    });
  }

  let _token = null;

  async function authorize() {
    const cfg = loadConfig();
    if (!cfg.clientId) throw new Error('No Client ID configured.');
    await loadScript('https://accounts.google.com/gsi/client');
    return new Promise((resolve, reject) => {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: cfg.clientId,
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: r => {
          if (r.error) { reject(new Error(r.error)); return; }
          _token = r.access_token;
          resolve(_token);
        }
      });
      client.requestAccessToken({ prompt: _token ? '' : 'select_account' });
    });
  }

  async function uploadFile(token, fileId, content) {
    const meta = { name: 'tracker-backup.json', mimeType: 'application/json' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file', new Blob([content], { type: 'application/json' }));
    const url = fileId
      ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
      : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    const res = await fetch(url, {
      method: fileId ? 'PATCH' : 'POST',
      headers: { Authorization: 'Bearer ' + token },
      body: form
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error((err.error && err.error.message) || 'Upload failed (' + res.status + ')');
    }
    return res.json();
  }

  async function fetchFile(token, fileId) {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      { headers: { Authorization: 'Bearer ' + token } }
    );
    if (!res.ok) throw new Error('Download failed (' + res.status + ')');
    return res.text();
  }

  async function save(onStatus) {
    try {
      onStatus('Authorizing…');
      const token = await authorize();
      onStatus('Saving…');
      const cfg = loadConfig();
      const content = localStorage.getItem(STORAGE_KEY) || '{}';
      const result = await uploadFile(token, cfg.fileId || null, content);
      const now = new Date().toLocaleString();
      saveConfig({ fileId: result.id, lastSaved: now });
      onStatus('Saved ' + now);
    } catch (e) {
      onStatus('Error: ' + e.message);
    }
  }

  async function load(onStatus) {
    try {
      onStatus('Authorizing…');
      const token = await authorize();
      const cfg = loadConfig();
      if (cfg.fileId) {
        onStatus('Downloading…');
        const content = await fetchFile(token, cfg.fileId);
        const parsed = JSON.parse(content);
        if (!parsed.perProfile && !parsed.config && !parsed.sessions && !parsed.baselines) throw new Error('Not a valid backup');
        if (!confirm('Replace all local data with Drive backup?')) { onStatus('Cancelled.'); return; }
        localStorage.setItem(STORAGE_KEY, content);
        onStatus('Loaded — reloading…');
        setTimeout(() => location.reload(), 800);
      } else {
        onStatus('Opening file picker…');
        await openPicker(token, onStatus);
      }
    } catch (e) {
      onStatus('Error: ' + e.message);
    }
  }

  async function openPicker(token, onStatus) {
    const cfg = loadConfig();
    if (!cfg.apiKey) {
      onStatus('');
      alert('Enter an API Key to use the file picker, or "Save to Drive" first (which stores the file ID for future loads).');
      return;
    }
    await loadScript('https://apis.google.com/js/api.js');
    await new Promise(r => gapi.load('picker', r));
    const picker = new google.picker.PickerBuilder()
      .addView(google.picker.ViewId.DOCS)
      .setOAuthToken(token)
      .setDeveloperKey(cfg.apiKey)
      .setCallback(async data => {
        if (data.action !== google.picker.Action.PICKED) { onStatus(''); return; }
        const fileId = data.docs[0].id;
        try {
          onStatus('Downloading…');
          const content = await fetchFile(token, fileId);
          const parsed = JSON.parse(content);
          if (!parsed.perProfile && !parsed.config && !parsed.sessions && !parsed.baselines) throw new Error('Not a valid backup');
          if (!confirm('Replace all local data with Drive backup?')) { onStatus('Cancelled.'); return; }
          saveConfig({ fileId });
          localStorage.setItem(STORAGE_KEY, content);
          onStatus('Loaded — reloading…');
          setTimeout(() => location.reload(), 800);
        } catch (e) {
          onStatus('Error: ' + e.message);
        }
      })
      .build();
    picker.setVisible(true);
  }

  return { loadConfig, saveConfig, save, load };
})();

/* ════════════════════════════════════════════════════════════════
   HEART RATE MONITOR  (Web Bluetooth — requires secure context)
   ════════════════════════════════════════════════════════════════ */
const HeartRate = (() => {
  let _char   = null;
  let _device = null;
  let _bpm    = null;
  let _buffer = []; // { ts, bpm }[]

  function _parseBpm(value) {
    const flags = value.getUint8(0);
    return (flags & 1) ? value.getUint16(1, true) : value.getUint8(1);
  }

  function _onNotification(e) {
    const bpm = _parseBpm(e.target.value);
    _bpm = bpm;
    const ts = Date.now();
    _buffer.push({ ts, bpm });
    const cutoff = ts - 30 * 60 * 1000;
    if (_buffer.length > 0 && _buffer[0].ts < cutoff) {
      _buffer = _buffer.filter(p => p.ts >= cutoff);
    }
    window.dispatchEvent(new CustomEvent('hr:reading', { detail: { bpm } }));
  }

  function _onDisconnect() {
    _char = null; _bpm = null;
    window.dispatchEvent(new CustomEvent('hr:disconnected'));
  }

  async function connect() {
    if (!navigator.bluetooth) {
      alert('Web Bluetooth is not supported in this browser, or the page is not served over HTTPS / localhost.');
      return;
    }
    try {
      _device = await navigator.bluetooth.requestDevice({
        filters: [{ services: ['heart_rate'] }]
      });
      _device.addEventListener('gattserverdisconnected', _onDisconnect);
      const server  = await _device.gatt.connect();
      const service = await server.getPrimaryService('heart_rate');
      _char = await service.getCharacteristic('heart_rate_measurement');
      _char.addEventListener('characteristicvaluechanged', _onNotification);
      await _char.startNotifications();
      window.dispatchEvent(new CustomEvent('hr:connected'));
    } catch (e) {
      _char = null;
      if (e.name !== 'NotFoundError') alert('HR connect failed: ' + e.message);
    }
  }

  function disconnect() {
    if (_device && _device.gatt.connected) _device.gatt.disconnect();
    _char = null; _bpm = null;
    window.dispatchEvent(new CustomEvent('hr:disconnected'));
  }

  function isConnected() { return _char !== null; }
  function latest()      { return _bpm; }

  function extractWindow(startTs, endTs) {
    const samples = _buffer
      .filter(p => p.ts >= startTs && p.ts <= endTs)
      .map(p => p.bpm);
    if (!samples.length) return { samples: [], avg: null, max: null, min: null };
    const avg = Math.round(samples.reduce((a, b) => a + b, 0) / samples.length);
    const max = Math.max(...samples);
    const min = Math.min(...samples);
    return { samples, avg, max, min };
  }

  return { connect, disconnect, isConnected, latest, extractWindow };
})();

/* ════════════════════════════════════════════════════════════════
   GPS DISTANCE TRACKING
   ════════════════════════════════════════════════════════════════ */
const GPS = (() => {
  let _watchId = null;
  let _distanceM = 0;
  let _lastPos = null;
  let _tracking = false;

  function _haversineM(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function start() {
    if (_tracking) return true;
    if (!navigator.geolocation) return false;
    _distanceM = 0;
    _lastPos = null;
    _tracking = true;
    _watchId = navigator.geolocation.watchPosition(
      pos => {
        if (pos.coords.accuracy > 25) return;
        const { latitude: lat, longitude: lng, accuracy } = pos.coords;
        if (_lastPos) _distanceM += _haversineM(_lastPos.lat, _lastPos.lng, lat, lng);
        _lastPos = { lat, lng };
        document.dispatchEvent(new CustomEvent('gps:update', {
          detail: { distanceM: _distanceM, accuracy }
        }));
      },
      err => {
        document.dispatchEvent(new CustomEvent('gps:error', { detail: err.message }));
      },
      { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
    );
    return true;
  }

  function stop() {
    if (_watchId != null) { navigator.geolocation.clearWatch(_watchId); _watchId = null; }
    _tracking = false;
  }

  return {
    start,
    stop,
    isTracking: () => _tracking,
    getDistanceM: () => _distanceM,
    isSupported: () => !!navigator.geolocation,
  };
})();

/* ════════════════════════════════════════════════════════════════
   DATE / SCHEDULE HELPERS
   ════════════════════════════════════════════════════════════════ */
function fmtISO(d) {
  // Local YYYY-MM-DD — avoid toISOString which is UTC and drifts across timezones.
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function todayISO() { return fmtISO(new Date()); }
function relDayLabel(iso) {
  const t = parseISO(todayISO());
  const d = parseISO(iso);
  const diff = Math.round((d - t) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  return fmtDateShort(iso);
}
function parseISO(s) {
  // local-midnight interpretation so day math doesn't drift by timezone
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = parseISO(iso);
  return d.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}
function fmtDateShort(iso) {
  if (!iso) return '';
  const d = parseISO(iso);
  return d.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' });
}
function dateForCycleDay(startISO, week, day) {
  const d = parseISO(startISO);
  d.setDate(d.getDate() + (week - 1) * 7 + (day - 1));
  return fmtISO(d);
}
function todaySessionFromConfig(cfg) {
  if (!cfg || !cfg.startDate) return { state: 'no-config' };
  const start = parseISO(cfg.startDate);
  const now = parseISO(todayISO());
  const dayIdx = Math.floor((now - start) / 86400000);
  if (dayIdx < 0) return { state: 'not-started', start: cfg.startDate };
  const prog = getActiveProgram();
  const numWeeks = Object.keys(prog.weeks).length;
  const week = Math.floor(dayIdx / 7) + 1;
  const day  = (dayIdx % 7) + 1;
  if (week > numWeeks) return { state: 'cycle-complete', week, day };
  return { state: 'ok', week, day };
}

/* ════════════════════════════════════════════════════════════════
   PROGRAMME LOOKUPS
   ════════════════════════════════════════════════════════════════ */
function dayDef(dayNum) { return getActiveProgram().days.find(d => d.day === dayNum); }

function setSpec(block, exercise, week) {
  // Returns { sets, reps (string|number), rest (seconds), perRoundReps (array|null) }
  const prog = getActiveProgram();
  const sets =
    (exercise.setsByWeek && exercise.setsByWeek[week]) ??
    exercise.sets ??
    (block.roundsByWeek && block.roundsByWeek[week]) ??
    1;
  let perRoundReps = null;
  let reps;
  if (exercise.repsPerRound && exercise.repsPerRound[week]) {
    perRoundReps = exercise.repsPerRound[week];
    reps = perRoundReps.join(' / ');
  } else if (exercise.customReps) {
    reps = exercise.customReps;
  } else if (exercise.repsByWeek && exercise.repsByWeek[week] != null) {
    reps = exercise.repsByWeek[week];
  } else if (exercise.reps != null) {
    reps = exercise.reps;
  } else if (block.kind === 'main' || block.kind === 'finisher') {
    reps = prog.weekDefaultReps[week];
  } else {
    reps = '';
  }
  const rest =
    (exercise.restByWeek && exercise.restByWeek[week]) ??
    (block.restByWeek && block.restByWeek[week]) ??
    prog.weeks[week].rest;
  return { sets, reps, perRoundReps, rest };
}

/* ════════════════════════════════════════════════════════════════
   TIMER STATE MACHINE
   ════════════════════════════════════════════════════════════════ */
const Timer = {
  state: { kind: 'idle' },
  raf: null,
  el: null,
  onTickCb: null,

  init(el) { this.el = el; },
  setOnTick(cb) { this.onTickCb = cb; },

  start() {
    if (this.raf) return;
    const tick = () => {
      this.render();
      if (this.state.kind !== 'idle') this.raf = requestAnimationFrame(tick);
      else { this.raf = null; }
    };
    this.raf = requestAnimationFrame(tick);
  },
  stop() {
    if (this.raf) { cancelAnimationFrame(this.raf); this.raf = null; }
    this.render();
  },

  beginSet(meta) {
    this.state = { kind: 'set-active', startedAt: Date.now(), meta };
    this.start();
    if (this.onTickCb) this.onTickCb('begin-set');
  },
  endSet() {
    if (this.state.kind !== 'set-active') return null;
    const startedAt = this.state.startedAt;
    const endedAt = Date.now();
    const meta = this.state.meta;
    this.state = { kind: 'resting', restStartedAt: endedAt, plannedRest: meta.plannedRest, meta };
    this.start();
    if (this.onTickCb) this.onTickCb('end-set', { startedAt, endedAt });
    return { startedAt, endedAt };
  },
  beginWarmup() {
    this.state = { kind: 'warmup-active', startedAt: Date.now() };
    this.start();
  },
  endWarmup() {
    if (this.state.kind !== 'warmup-active') return null;
    const startedAt = this.state.startedAt;
    const endedAt = Date.now();
    this.state = { kind: 'idle' };
    this.stop();
    return { startedAt, endedAt };
  },
  endRest() {
    if (this.state.kind !== 'resting') return null;
    const restSeconds = Math.round((Date.now() - this.state.restStartedAt) / 1000);
    this.state = { kind: 'idle' };
    this.stop();
    if (this.onTickCb) this.onTickCb('end-rest', { restSeconds });
    return restSeconds;
  },
  addRest(seconds) {
    if (this.state.kind !== 'resting') return;
    this.state.plannedRest += seconds;
    this.render();
  },
  cancel() {
    this.state = { kind: 'idle' };
    this.stop();
    if (this.onTickCb) this.onTickCb('cancel');
  },

  _renderedKind: null,
  buildStructure(kind) {
    if (this._renderedKind === kind) return;
    this._renderedKind = kind;
    const el = this.el;
    if (kind === 'set-active') {
      el.innerHTML = `
        <div class="set-info-strip">
          <span class="label">SET IN PROGRESS</span>
          <span class="ex" id="tm-ex"></span>
        </div>
        <div class="set-details-strip">
          <span class="detail-reps" id="tm-reps"></span>
          <span class="detail-tempo" id="tm-tempo"></span>
        </div>
        <div class="rest-display">
          <div class="rest-col">
            <div class="rest-label">TIME</div>
            <div class="rest-digits" id="tm-digits">00:00</div>
          </div>
          <div class="rest-col">
            <div class="rest-label">♥ BPM</div>
            <div class="rest-bpm" id="tm-hr-big">--</div>
          </div>
        </div>
        <div class="controls">
          <button class="btn block" id="timer-end-set">End set &amp; rest</button>
        </div>`;
      document.getElementById('timer-end-set').addEventListener('click', () => {
        window.dispatchEvent(new CustomEvent('timer:end-set'));
      });
    } else if (kind === 'warmup-active') {
      el.innerHTML = `
        <div class="row">
          <div>
            <div class="label">WARM-UP IN PROGRESS</div>
            <div class="ex">All warm-up exercises (no rest tracked)</div>
          </div>
          <div class="digits" id="tm-digits">00:00</div>
          <span class="hr-inline" id="tm-hr"></span>
        </div>
        <div class="controls">
          <button class="btn block" id="timer-end-warmup">End warm-up</button>
        </div>`;
      document.getElementById('timer-end-warmup').addEventListener('click', () => {
        window.dispatchEvent(new CustomEvent('timer:end-warmup'));
      });
    } else if (kind === 'resting') {
      el.innerHTML = `
        <div class="rest-display">
          <div class="rest-col">
            <div class="rest-label">REST</div>
            <div class="rest-digits" id="tm-digits">00:00</div>
          </div>
          <div class="rest-col">
            <div class="rest-label">♥ BPM</div>
            <div class="rest-bpm" id="tm-hr-big">--</div>
          </div>
        </div>
        <div class="controls">
          <button class="btn secondary sm" id="timer-add-rest">+30 s</button>
          <button class="btn secondary sm" id="timer-skip-rest">Skip rest</button>
        </div>`;
      document.getElementById('timer-add-rest').addEventListener('click', () => this.addRest(30));
      document.getElementById('timer-skip-rest').addEventListener('click', () => {
        window.dispatchEvent(new CustomEvent('timer:skip-rest'));
      });
    }
  },
  render() {
    const el = this.el;
    if (!el) return;
    const s = this.state;
    if (s.kind === 'idle') {
      el.hidden = true;
      this._renderedKind = null;
      document.body.classList.remove('has-timer');
      return;
    }
    el.hidden = false;
    document.body.classList.add('has-timer');
    this.buildStructure(s.kind);

    if (s.kind === 'set-active') {
      const elapsed = Math.floor((Date.now() - s.startedAt) / 1000);
      if (el.className !== 'timer-bar set-active') el.className = 'timer-bar set-active';
      const exEl = document.getElementById('tm-ex');
      const txt = `${s.meta.exerciseName} · Set ${s.meta.setIndex}/${s.meta.totalSets}`;
      if (exEl.textContent !== txt) exEl.textContent = txt;
      const repsEl = document.getElementById('tm-reps');
      if (repsEl && repsEl.textContent !== (s.meta.reps || '')) repsEl.textContent = s.meta.reps || '';
      const tempoEl = document.getElementById('tm-tempo');
      if (tempoEl) {
        const tempoTxt = s.meta.tempo ? `Tempo ${s.meta.tempo}` : '';
        if (tempoEl.textContent !== tempoTxt) tempoEl.textContent = tempoTxt;
        tempoEl.hidden = !s.meta.tempo;
      }
      document.getElementById('tm-digits').textContent = fmtTime(elapsed);
      const hrBigEl = document.getElementById('tm-hr-big');
      if (hrBigEl) hrBigEl.textContent = HeartRate.isConnected() && HeartRate.latest() != null ? HeartRate.latest() : '--';
    } else if (s.kind === 'warmup-active') {
      const elapsed = Math.floor((Date.now() - s.startedAt) / 1000);
      if (el.className !== 'timer-bar set-active') el.className = 'timer-bar set-active';
      document.getElementById('tm-digits').textContent = fmtTime(elapsed);
      const hrEl = document.getElementById('tm-hr');
      if (hrEl) hrEl.textContent = HeartRate.isConnected() && HeartRate.latest() ? '♥ ' + HeartRate.latest() : '';
    } else if (s.kind === 'resting') {
      const elapsed = Math.floor((Date.now() - s.restStartedAt) / 1000);
      const planned = s.plannedRest;
      const colour = elapsed >= planned ? 'green' : 'red';
      const className = 'timer-bar ' + colour;
      if (el.className !== className) el.className = className;
      document.getElementById('tm-digits').textContent = fmtTime(elapsed);
      const cfg = Storage.getConfig() || {};
      const recoveryHrTarget = cfg.recoveryHrTarget ? Number(cfg.recoveryHrTarget) : null;
      const bpm = HeartRate.latest();
      const hrBigEl = document.getElementById('tm-hr-big');
      if (hrBigEl) {
        if (HeartRate.isConnected() && bpm != null) {
          hrBigEl.textContent = bpm;
          hrBigEl.className = recoveryHrTarget != null
            ? 'rest-bpm ' + (bpm <= recoveryHrTarget ? 'bpm-green' : 'bpm-red')
            : 'rest-bpm';
        } else {
          hrBigEl.textContent = '--';
          hrBigEl.className = 'rest-bpm';
        }
      }
    }
  },
};

function fmtTime(s) {
  if (s == null || !isFinite(s)) return '--:--';
  const sign = s < 0 ? '-' : '';
  s = Math.abs(s);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return sign + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

/* ════════════════════════════════════════════════════════════════
   ROUTER
   ════════════════════════════════════════════════════════════════ */
function parseHash() {
  const h = location.hash.replace(/^#/, '');
  const [path, query] = h.split('?');
  const params = Object.fromEntries(
    (query || '').split('&').filter(Boolean).map(p => {
      const [k, v] = p.split('=');
      return [decodeURIComponent(k), decodeURIComponent(v || '')];
    })
  );
  return { path: path || '/', params };
}

function go(path) { location.hash = path; }

function route() {
  const { path, params } = parseHash();
  const cfg = Storage.getConfig();
  const navMap = { '/today': 'today', '/setup': 'setup', '/history': 'history', '/day': 'today', '/health': 'health' };
  const navKey = navMap[path] || (path === '/' ? 'today' : '');
  document.querySelectorAll('.bottom-nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.route === navKey);
  });
  Timer.cancel();
  stopCardioOnNav();

  if (path === '/' || path === '/today') {
    if (!cfg) return renderSetup(true);
    const t = todaySessionFromConfig(cfg);
    if (t.state === 'no-config' || t.state === 'not-started') return renderDay(null, null, t);
    if (t.state === 'cycle-complete') return renderCycleComplete(t);
    return renderDay(t.week, t.day);
  }
  if (path === '/setup') return renderSetup(false);
  if (path === '/history') return renderHistory();
  if (path === '/health') return renderHealth();
  if (path === '/day') {
    const w = Number(params.w), d = Number(params.d);
    const numW = Object.keys(getActiveProgram().weeks).length;
    const numD = getActiveProgram().days.length;
    if (!w || !d || w < 1 || w > numW || d < 1 || d > numD) return renderSetup(true);
    return renderDay(w, d);
  }
  // fallback
  return renderSetup(!cfg);
}

window.addEventListener('hashchange', route);

function renderCycleComplete(t) {
  document.getElementById('topbar-title').textContent = 'Cycle complete';
  document.getElementById('topbar-sub').textContent = '';
  const view = document.getElementById('view');
  const cfg = Storage.getConfig();
  view.innerHTML = `
    <div class="card">
      <h2>Cycle ${cfg.cycleNumber} complete</h2>
      <p class="note">
        You've passed the 28-day mark. Time to set up the next cycle —
        Week 1 weights should be <strong>slightly heavier</strong> than this cycle's Week 1
        (typically the W2 loads you ended up using).
      </p>
      <button class="btn block mt-2" id="new-cycle-btn">Start new cycle</button>
      <button class="btn secondary block mt-2" id="hist-btn">View history</button>
    </div>
  `;
  document.getElementById('new-cycle-btn').onclick = () => {
    // Seed next cycle's W1 weights from this cycle's W2 projection
    const prevCycle = cfg.cycleNumber;
    const prevBaselines = Storage.getBaselines(prevCycle);
    const nextBaselines = {};
    listWeightedExercises().forEach(ex => {
      const w1 = prevBaselines[ex.id];
      if (w1 != null) {
        const w2 = projectedWeight(w1, ex.weightType, 2, ex.progression);
        if (w2 != null) nextBaselines[ex.id] = w2;
      }
    });
    const nextCycle = prevCycle + 1;
    Storage.setBaselines(nextCycle, nextBaselines);
    Storage.setConfig({ startDate: todayISO(), cycleNumber: nextCycle });
    go('/setup');
  };
  document.getElementById('hist-btn').onclick = () => go('/history');
}
