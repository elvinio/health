        <div class="row mt-2">
          <button class="btn secondary" onclick="go('/setup')">Edit start date</button>
          <button class="btn" onclick="go('/day?w=1&d=1')">Preview Day 1</button>
        </div>
      </div>
    `;
    return;
  }
  if (!cfg) { go('/setup'); return; }

  const d = dayDef(day);
  if (!d) { view.innerHTML = '<div class="empty">Unknown day.</div>'; return; }

  const dateISO = dateForCycleDay(cfg.startDate, week, day);
  const existing = Storage.getSession(dateISO);
  activeDayState = existing || { week, day, exercises: {} };
  activeDayState.dateISO = dateISO;
  activeDayState.week = week;
  activeDayState.day = day;
  if (d && d.type === 'cardio') {
    activeDayState.cardio = activeDayState.cardio || {
      startedAt: null, endedAt: null,
      distanceMeters: 0,
      hrSamples: [], hrAvg: null, hrMax: null, hrMin: null,
    };
  }

  const prog = getActiveProgram();
  document.getElementById('topbar-title').textContent = `Week ${week} · Day ${day}`;
  document.getElementById('topbar-sub').textContent =
    `${prog.weeks[week].phase} · RPE ${prog.weeks[week].rpe} · ${prog.weeks[week].rest}s rest`;

  const isRestType = d.type !== 'strength';

  let html = `
    <div class="day-header">
      <div class="week-label">${escapeHtml(prog.weeks[week].phase)} · Week ${week}</div>
      <div class="day-title">${escapeHtml(d.name)}</div>
      <div class="day-date">${escapeHtml(fmtDate(dateISO))}</div>
    </div>
    <div class="day-nav">
      <button class="btn secondary sm" id="prev-day">← Prev</button>
      <button class="btn ghost sm" id="today-day">${escapeHtml(relDayLabel(dateISO))}</button>
      <button class="btn secondary sm" id="next-day">Next →</button>
    </div>
  `;

  if (isRestType) {
    html += `
      <div class="card">
        <h2>${d.type === 'rest' ? 'Rest day' : (d.type === 'cardio' ? 'Cardio session' : 'Active recovery')}</h2>
        <ul style="padding-left: 18px; line-height: 1.7;">
          ${d.notes.map(n => `<li class="note">${escapeHtml(n)}</li>`).join('')}
        </ul>
      </div>
    `;
    if (d.type === 'cardio') {
      const initBpm = HeartRate.isConnected() && HeartRate.latest() ? HeartRate.latest() : '--';
      const already = activeDayState.cardio;
      const isRunning = already && already.startedAt && !already.endedAt;
      const isDone    = already && already.endedAt;
      html += `
        <div class="card" id="cardio-dash">
          <div class="cardio-stats">
            <div class="cardio-stat">
              <div class="cardio-stat-val" id="c-time">${isDone ? fmtTime(Math.round((already.endedAt - already.startedAt) / 1000)) : '0:00'}</div>
              <div class="cardio-stat-lbl">time</div>
            </div>
            <div class="cardio-stat">
              <div class="cardio-stat-val" id="c-dist">${isDone ? ((already.distanceMeters || 0) / 1000).toFixed(2) : '0.00'}</div>
              <div class="cardio-stat-lbl">km</div>
            </div>
            <div class="cardio-stat">
              <div class="cardio-stat-val" id="c-pace">--:--</div>
              <div class="cardio-stat-lbl">min/km</div>
            </div>
            <div class="cardio-stat">
              <div class="cardio-stat-val cardio-hr-num" id="cardio-hr-num">${initBpm}</div>
              <div class="cardio-stat-lbl">bpm</div>
            </div>
          </div>
          <div class="cardio-zone" id="c-zone"></div>
          <div class="cardio-gps-status" id="c-gps-status">${isDone ? 'Session complete' : (GPS.isSupported() ? 'GPS ready' : 'GPS not available')}</div>
          <div id="c-actions">
            ${isDone
              ? `<div class="note" style="text-align:center">Saved ${fmtTime(Math.round((already.endedAt - already.startedAt) / 1000))} · ${((already.distanceMeters || 0) / 1000).toFixed(2)} km${already.hrAvg ? ' · ♥ avg ' + already.hrAvg : ''}</div>`
              : isRunning
                ? `<button class="btn block danger" id="c-end-btn">End Session</button>`
                : `<button class="btn block" id="c-start-btn">Start Cardio</button>`}
          </div>
        </div>
      `;
    }
  } else {
    if (d.purpose) {
      html += `<div class="card subtle"><div class="note">${escapeHtml(d.purpose)}</div></div>`;
    }
    d.blocks.forEach((block, bi) => {
      html += renderBlock(block, week, bi);
    });
    html += `
      <div class="day-finish">
        <button class="btn block" id="finish-session">Mark session complete</button>
      </div>
    `;
  }

  view.innerHTML = html;

  document.getElementById('prev-day').onclick = () => navDay(-1);
  document.getElementById('next-day').onclick = () => navDay(+1);
  document.getElementById('today-day').onclick = () => go('/today');

  if (d.type === 'cardio') {
    const startBtn = document.getElementById('c-start-btn');
    const endBtn   = document.getElementById('c-end-btn');
    if (startBtn) startBtn.onclick = startCardio;
    if (endBtn)   endBtn.onclick   = endCardio;
    // If a session was started but not finished (e.g. page refresh), re-attach ticker
    if (activeDayState.cardio.startedAt && !activeDayState.cardio.endedAt) {
      _resumeCardioTracking();
    }
  } else if (!isRestType) {
    attachDayHandlers(d, week);
    document.getElementById('finish-session').onclick = () => {
      activeDayState.completedAt = Date.now();
      persistDayState();
      alert('Session marked complete.');
      go('/history');
    };
  }
}

function navDay(delta) {
  const w = activeDayState.week, d = activeDayState.day;
  let nd = d + delta, nw = w;
  if (nd < 1) { nw -= 1; nd = 7; }
  if (nd > 7) { nw += 1; nd = 1; }
  if (nw < 1 || nw > 4) return;
  go(`/day?w=${nw}&d=${nd}`);
}

/* ── Cardio GPS session ─────────────────────────────────── */
let _cardioHrListener   = null;
let _cardioTimerInterval = null;
let _cardioGpsListener  = null;
let _cardioGpsErrListener = null;

function _cardioUpdateDisplay() {
  const state = activeDayState && activeDayState.cardio;
  if (!state || !state.startedAt) return;
  const elapsed = Math.floor((Date.now() - state.startedAt) / 1000);
  const km = GPS.getDistanceM() / 1000;
  const paceStr = km > 0.05
    ? fmtTime(Math.round(elapsed / km))
    : '--:--';
  const tEl = document.getElementById('c-time');
  const dEl = document.getElementById('c-dist');
  const pEl = document.getElementById('c-pace');
  if (tEl) tEl.textContent = fmtTime(elapsed);
  if (dEl) dEl.textContent = km.toFixed(2);
  if (pEl) pEl.textContent = paceStr;
}

function _cardioUpdateZone(bpm) {
  const el = document.getElementById('c-zone');
  if (!el) return;
  if (bpm >= 107 && bpm <= 125) {
    el.className = 'cardio-zone zone-ok';
    el.textContent = 'Zone 2 ✓';
  } else if (bpm > 125) {
    el.className = 'cardio-zone zone-hi';
    el.textContent = 'Too fast — slow down';
  } else {
    el.className = 'cardio-zone zone-lo';
    el.textContent = bpm > 0 ? 'Pick up the pace' : '';
  }
}

function _stopCardioListeners() {
  if (_cardioHrListener)     { window.removeEventListener('hr:reading', _cardioHrListener);   _cardioHrListener = null; }
  if (_cardioTimerInterval)  { clearInterval(_cardioTimerInterval); _cardioTimerInterval = null; }
  if (_cardioGpsListener)    { document.removeEventListener('gps:update', _cardioGpsListener); _cardioGpsListener = null; }
  if (_cardioGpsErrListener) { document.removeEventListener('gps:error', _cardioGpsErrListener); _cardioGpsErrListener = null; }
}

function _resumeCardioTracking() {
  _stopCardioListeners();

  _cardioHrListener = e => {
    const { bpm } = e.detail;
    if (activeDayState && activeDayState.cardio) activeDayState.cardio.hrSamples.push(bpm);
    _cardioUpdateZone(bpm);
  };
  window.addEventListener('hr:reading', _cardioHrListener);

  _cardioGpsListener = e => {
    const gpsEl = document.getElementById('c-gps-status');
    if (gpsEl) gpsEl.textContent = `GPS ±${Math.round(e.detail.accuracy)} m`;
    _cardioUpdateDisplay();
  };
  document.addEventListener('gps:update', _cardioGpsListener);

  _cardioGpsErrListener = e => {
    const gpsEl = document.getElementById('c-gps-status');
    if (gpsEl) gpsEl.textContent = 'GPS error: ' + e.detail;
  };
  document.addEventListener('gps:error', _cardioGpsErrListener);

  _cardioTimerInterval = setInterval(_cardioUpdateDisplay, 1000);
  _cardioUpdateDisplay();
}

function startCardio() {
  if (!activeDayState || !activeDayState.cardio) return;
  if (activeDayState.cardio.startedAt) return;
  if (!GPS.isSupported()) { alert('GPS (Geolocation) is not available in this browser.'); return; }

  const ok = GPS.start();
  if (!ok) { alert('Could not start GPS.'); return; }

  activeDayState.cardio.startedAt = Date.now();
  if (!activeDayState.startedAt) activeDayState.startedAt = activeDayState.cardio.startedAt;

  const actionsEl = document.getElementById('c-actions');
  if (actionsEl) {
    actionsEl.innerHTML = `<button class="btn block danger" onclick="endCardio()">End Session</button>`;
  }
  const gpsEl = document.getElementById('c-gps-status');
  if (gpsEl) gpsEl.textContent = 'GPS acquiring…';

  _resumeCardioTracking();
  persistDayState();
}

function endCardio() {
  if (!activeDayState || !activeDayState.cardio || !activeDayState.cardio.startedAt) return;
  if (!confirm('End and save this cardio session?')) return;

  GPS.stop();
  _stopCardioListeners();

  activeDayState.cardio.endedAt       = Date.now();
  activeDayState.cardio.distanceMeters = GPS.getDistanceM();

  const samples = activeDayState.cardio.hrSamples;
  if (samples.length) {
    activeDayState.cardio.hrAvg = Math.round(samples.reduce((a, b) => a + b, 0) / samples.length);
    activeDayState.cardio.hrMax = Math.max(...samples);
    activeDayState.cardio.hrMin = Math.min(...samples);
  }

  activeDayState.completedAt = activeDayState.cardio.endedAt;
  persistDayState();
  go('/history');
}

function stopCardioOnNav() {
  if (GPS.isTracking()) GPS.stop();
  _stopCardioListeners();
}

function renderWarmupBlock(block, week) {
  const w = activeDayState.warmup || {};
  const done = !!w.endedAt;
  const inProgress = !!w.startedAt && !w.endedAt;
  let label = 'Start warm-up';
  let cls = '';
  if (done) {
    const dur = Math.round((w.endedAt - w.startedAt) / 1000);
    label = `✓ Warm-up done · ${fmtTime(dur)}`;
    cls = ' done';
  } else if (inProgress) {
    label = '● Warm-up in progress — tap to end';
    cls = ' active';
  }

  const items = block.exercises.map(ex => {
    const spec = setSpec(block, ex, week);
    const sideLabel = ex.perSide ? ' / side' : '';
    const repsTxt = spec.perRoundReps
      ? spec.perRoundReps.join(' / ') + ' reps' + sideLabel
      : (typeof spec.reps === 'number' ? `${spec.reps} reps${sideLabel}` : spec.reps);
    return `<li>
      <span>${escapeHtml(ex.name)}</span>
      <span class="w-spec">${spec.sets} × ${escapeHtml(String(repsTxt))}</span>
    </li>`;
  }).join('');

  return `<div class="block">
    <div class="block-title">${escapeHtml(block.name)}</div>
    <div class="exercise warmup-card">
      <ul class="warmup-list">${items}</ul>
      <button class="btn block warmup-btn${cls}" id="warmup-btn">${escapeHtml(label)}</button>
    </div>
  </div>`;
}

function renderBlock(block, week, bi) {
  if (block.kind === 'warmup') return renderWarmupBlock(block, week);
  const blockId = `b${bi}`;
  const meta = [];
  if (block.roundsByWeek) meta.push(`${block.roundsByWeek[week]} rounds`);
  if (block.kind === 'main' || block.kind === 'finisher') {
    const r = (block.exercises[0] && block.exercises[0].restByWeek && block.exercises[0].restByWeek[week]) || getActiveProgram().weeks[week].rest;
    meta.push(`${r}s rest`);
  }
  if (block.superset) meta.push('superset');
  const metaTxt = meta.length ? ` <span class="block-meta">— ${meta.join(' · ')}</span>` : '';

  let html = `<div class="block">
    <div class="block-title">${escapeHtml(block.name)}${metaTxt}</div>`;

  block.exercises.forEach((ex, ei) => {
    html += renderExercise(block, ex, week, blockId + '-e' + ei);
  });

  if (block.restNote) {
    html += `<div class="text-xs text-muted" style="padding: 4px 6px;">${escapeHtml(block.restNote)}</div>`;
  }

  html += `</div>`;
  return html;
}

function renderExercise(block, ex, week, exDomId) {
  const spec = setSpec(block, ex, week);
  const exKey = ex.id || ('local-' + exDomId);
  const cfg = Storage.getConfig();
  const baseline = ex.id ? Storage.getBaseline(cfg.cycleNumber, ex.id) : null;
  const planned = projectedWeight(baseline, ex.weightType, week, ex.progression);

  // Read-only display state for this exercise on this date.
  // Do NOT mutate activeDayState here — that ref-leaks into Storage._data and bloats it.
  // activeDayState entries are created lazily on actual user action (start set or edit weight).
  const stored = activeDayState.exercises[exKey];
  const exState = {
    plannedWeight: stored?.plannedWeight ?? planned,
    actualWeight: stored?.actualWeight ?? planned,
    sets: stored?.sets ?? [],
  };

  const hint = WEIGHT_HINTS[ex.weightType];
  const showWeight = ex.weightType && ex.weightType !== 'none';
  const supersetClass = block.superset ? ' superset-pair' : '';
  const sideLabel = ex.perSide ? ' / side' : '';
  const repsTxt = spec.perRoundReps
    ? spec.perRoundReps.join(' / ') + ' reps' + sideLabel
    : (typeof spec.reps === 'number' ? `${spec.reps} reps${sideLabel}` : spec.reps);

  let html = `<div class="exercise${supersetClass}" data-ex-key="${escapeHtml(exKey)}" data-ex-id="${escapeHtml(ex.id || '')}">
    <div class="ex-head">
      <div class="name">${escapeHtml(ex.name)}</div>
      <div class="meta">${spec.sets} × ${escapeHtml(String(repsTxt))}</div>
    </div>
    ${ex.tempo ? `<div class="ex-tempo"><span class="lbl">Tempo</span>${escapeHtml(ex.tempo)}</div>` : ''}
    ${ex.cue ? `<div class="ex-cue">${escapeHtml(ex.cue)}</div>` : ''}`;

  const lastSession = ex.id ? getLastSessionWeight(ex.id, activeDayState.dateISO) : null;
  const unit = hint ? hint.unit : 'kg';

  if (showWeight) {
    html += `
      <div class="ex-weight-row">
        <label>Weight:</label>
        <input type="number" inputmode="decimal" step="0.5" min="0"
               class="input-inline ex-weight-input"
               data-ex-key="${escapeHtml(exKey)}"
               data-planned="${planned != null ? planned : ''}"
               value="${exState.actualWeight ?? ''}"
               placeholder="${planned != null ? planned : '—'}">
        <span class="unit">${escapeHtml(unit)}</span>
        ${planned != null ? `<span class="text-xs text-muted">plan: ${planned}</span>` : '<span class="text-xs text-muted">no baseline</span>'}
        ${lastSession ? `<span class="ex-last">Last: <strong>${lastSession.weight}${escapeHtml(unit)}</strong> · W${lastSession.week} D${lastSession.day}</span>` : ''}
      </div>
    `;
  }

  html += `<ul class="set-list">`;
  for (let i = 1; i <= spec.sets; i++) {
    const setState = exState.sets.find(s => s.setIndex === i);
    const done = setState && setState.endedAt;
    const inProgress = setState && setState.startedAt && !setState.endedAt;
    const repsForSet = spec.perRoundReps ? (spec.perRoundReps[i - 1] != null ? spec.perRoundReps[i - 1] + ' reps' + sideLabel : '—') : repsTxt;
    let actionLabel = 'Start';
    let actionClass = '';
    let stat = '';
    if (done) {
      actionLabel = '✓ Done';
      actionClass = ' done';
      const setDur = Math.round((setState.endedAt - setState.startedAt) / 1000);
      stat = `${fmtTime(setDur)}${setState.restSeconds != null ? ' · rest ' + fmtTime(setState.restSeconds) : ''}`;
    } else if (inProgress) {
      actionLabel = '● Active';
      actionClass = ' active';
    }
    const rpeVal = setState && setState.rpe != null ? setState.rpe : '';
    const rpeOptions = ['5','5.5','6','6.5','7','7.5','8','8.5','9','9.5','10']
      .map(v => `<option value="${v}"${String(rpeVal) === v ? ' selected' : ''}>${v}</option>`).join('');
    html += `
      <li class="set-row${done ? ' done' : ''}">
        <div class="set-num">Set ${i}</div>
        <div class="set-reps">${escapeHtml(String(repsForSet))}</div>
        <div class="set-stat">${stat}</div>
        <button class="set-action${actionClass}"
                data-ex-key="${escapeHtml(exKey)}"
                data-ex-name="${escapeHtml(ex.name)}"
                data-set-index="${i}"
                data-total-sets="${spec.sets}"
                data-planned-rest="${spec.rest}"
                data-reps="${escapeHtml(String(repsForSet))}"
                data-tempo="${escapeHtml(ex.tempo || '')}"
                data-planned="${planned != null ? planned : ''}">${actionLabel}</button>
        ${done ? `
          <div class="set-rpe">
            <label for="rpe-${escapeHtml(exKey)}-${i}">RPE</label>
            <select id="rpe-${escapeHtml(exKey)}-${i}" class="rpe-select"
                    data-ex-key="${escapeHtml(exKey)}" data-set-index="${i}">
              <option value=""${rpeVal === '' ? ' selected' : ''}>—</option>
              ${rpeOptions}
            </select>
          </div>
        ` : ''}
      </li>
    `;
  }
  html += `</ul></div>`;
  return html;
}

function ensureExEntry(exKey, plannedAttr) {
  if (!activeDayState.exercises[exKey]) {
    activeDayState.exercises[exKey] = {
      plannedWeight: plannedAttr != null ? Number(plannedAttr) : null,
      actualWeight: plannedAttr != null ? Number(plannedAttr) : null,
      sets: [],
    };
  }
  return activeDayState.exercises[exKey];
}

function attachDayHandlers(dayDef, week) {
  // Weight overrides
  document.querySelectorAll('.ex-weight-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const exKey = inp.dataset.exKey;
      const v = inp.value === '' ? null : Number(inp.value);
      const ex = ensureExEntry(exKey, inp.dataset.planned);
      ex.actualWeight = v;
      persistDayState();
    });
  });

  // Set actions
  document.querySelectorAll('.set-action').forEach(btn => {
    btn.addEventListener('click', () => handleSetAction(btn));
  });

  // RPE selectors (only present on completed sets)
  document.querySelectorAll('.rpe-select').forEach(sel => {
    sel.addEventListener('change', () => {
      const exKey = sel.dataset.exKey;
      const setIndex = Number(sel.dataset.setIndex);
      const exState = activeDayState.exercises[exKey];
      if (!exState) return;
      const set = (exState.sets || []).find(s => s.setIndex === setIndex);
      if (!set) return;
      set.rpe = sel.value === '' ? null : Number(sel.value);
      persistDayState();
    });
  });

  // Warmup button
  const warmupBtn = document.getElementById('warmup-btn');
  if (warmupBtn) warmupBtn.addEventListener('click', handleWarmupAction);

  // Timer events — remove any previously bound handlers so re-renders don't stack listeners
  window.removeEventListener('timer:end-set', onTimerEndSet);
  window.removeEventListener('timer:skip-rest', onTimerSkipRest);
  window.removeEventListener('timer:end-warmup', onTimerEndWarmup);
  window.addEventListener('timer:end-set', onTimerEndSet);
  window.addEventListener('timer:skip-rest', onTimerSkipRest);
  window.addEventListener('timer:end-warmup', onTimerEndWarmup);
}

/* Drop any in-progress set entries (startedAt but no endedAt) anywhere in the
   session. Called before starting a new set so the user can't accumulate
   multiple half-recorded sets by tapping Start without End. */
function abandonInProgressSets() {
  Object.values(activeDayState.exercises).forEach(ex => {
    ex.sets = (ex.sets || []).filter(s => s.endedAt);
  });
}

/* If a warmup is mid-flight when the user moves on, close it out with the
   elapsed time so the partial record isn't lost. */
function closeOpenWarmup() {
  if (activeDayState.warmup && !activeDayState.warmup.endedAt) {
    activeDayState.warmup.endedAt = Date.now();
  }
}

let pendingSet = null; // { exKey, exerciseName, setIndex, totalSets, plannedRest }

function handleSetAction(btn) {
  const exKey = btn.dataset.exKey;
  const setIndex = Number(btn.dataset.setIndex);
  const totalSets = Number(btn.dataset.totalSets);
  const exerciseName = btn.dataset.exName;
  const plannedRest = Number(btn.dataset.plannedRest);
  const reps = btn.dataset.reps || '';
  const tempo = btn.dataset.tempo || '';

  const exState = ensureExEntry(exKey, btn.dataset.planned);
  const existing = exState.sets.find(s => s.setIndex === setIndex);
  if (existing && existing.endedAt) {
    if (!confirm('Set already logged. Restart this set?')) return;
    exState.sets = exState.sets.filter(s => s.setIndex !== setIndex);
    persistDayState();
  }

  // If currently resting, close the rest and record restSeconds for the prior set
  if (Timer.state.kind === 'resting') {
    const rs = Timer.endRest();
    if (rs != null && pendingSet) {
      const ps = pendingSet;
      const prevState = activeDayState.exercises[ps.exKey];
      const prevSet = prevState && prevState.sets.find(s => s.setIndex === ps.setIndex);
      if (prevSet) prevSet.restSeconds = rs;
    }
  }
  // A warmup in-flight? Close it out so the duration is preserved.
  if (Timer.state.kind === 'warmup-active') {
    const r = Timer.endWarmup();
    if (r && activeDayState.warmup) activeDayState.warmup.endedAt = r.endedAt;
  } else {
    closeOpenWarmup();
  }
  // Anything else? Drop it. Then drop any in-progress sets across the whole
  // session so two sets can never appear active at once.
  if (Timer.state.kind === 'set-active') Timer.cancel();
  abandonInProgressSets();

  // Start this set
  Timer.beginSet({ exerciseName, setIndex, totalSets, plannedRest, reps, tempo });
  pendingSet = { exKey, exerciseName, setIndex, totalSets, plannedRest };
  // Persist startedAt so a refresh mid-set isn't lost
  const setEntry = { setIndex, startedAt: Date.now() };
  exState.sets = exState.sets.filter(s => s.setIndex !== setIndex).concat(setEntry);
  if (!activeDayState.startedAt) activeDayState.startedAt = Date.now();
  persistDayState();
  rerenderActiveSetButton(exKey, setIndex);
}

function handleWarmupAction() {
  const w = activeDayState.warmup;
  if (w && w.endedAt) {
    if (!confirm('Warm-up already logged. Restart?')) return;
    activeDayState.warmup = null;
    persistDayState();
    rerenderActiveSetButton();
    return;
  }
  if (w && w.startedAt && !w.endedAt) {
    // End the active warmup
    const r = Timer.endWarmup();
    if (r) activeDayState.warmup.endedAt = r.endedAt;
    persistDayState();
    rerenderActiveSetButton();
    return;
  }
  // Start a new warmup — clear any other in-flight work
  if (Timer.state.kind === 'set-active' || Timer.state.kind === 'resting') Timer.cancel();
  abandonInProgressSets();
  Timer.beginWarmup();
  activeDayState.warmup = { startedAt: Date.now() };
  if (!activeDayState.startedAt) activeDayState.startedAt = Date.now();
  persistDayState();
  rerenderActiveSetButton();
}

function onTimerEndWarmup() {
  const r = Timer.endWarmup();
  if (!r || !activeDayState.warmup) return;
  activeDayState.warmup.endedAt = r.endedAt;
  if (HeartRate.isConnected()) {
    const hr = HeartRate.extractWindow(r.startedAt, r.endedAt);
    activeDayState.warmup.hrSamples = hr.samples;
    activeDayState.warmup.hrAvg     = hr.avg;
    activeDayState.warmup.hrMax     = hr.max;
  }
  persistDayState();
  rerenderActiveSetButton();
}

function onTimerEndSet() {
  const r = Timer.endSet();
  if (!r || !pendingSet) return;
  const ps = pendingSet;
  const exState = activeDayState.exercises[ps.exKey];
  const setEntry = exState.sets.find(s => s.setIndex === ps.setIndex);
  if (setEntry) {
    setEntry.startedAt = r.startedAt;
    setEntry.endedAt   = r.endedAt;
    if (HeartRate.isConnected()) {
      const hr = HeartRate.extractWindow(r.startedAt, r.endedAt);
      setEntry.hrSamples = hr.samples;
      setEntry.hrAvg     = hr.avg;
      setEntry.hrMax     = hr.max;
    }
  }
  persistDayState();
  rerenderActiveSetButton(ps.exKey, ps.setIndex);
}

function onTimerSkipRest() {
  const rs = Timer.endRest();
  if (rs != null && pendingSet) {
    const ps = pendingSet;
    const exState = activeDayState.exercises[ps.exKey];
    const prevSet = exState.sets.find(s => s.setIndex === ps.setIndex);
    if (prevSet) {
      prevSet.restSeconds = rs;
      if (HeartRate.isConnected()) {
        const restEnd   = Date.now();
        const restStart = restEnd - rs * 1000;
        const hr = HeartRate.extractWindow(restStart, restEnd);
        prevSet.restHrSamples = hr.samples;
        prevSet.restHrAvg     = hr.avg;
        prevSet.restHrMax     = hr.max;
      }
      persistDayState();
      rerenderActiveSetButton(ps.exKey, ps.setIndex);
    }
  }
  pendingSet = null;
}

function rerenderActiveSetButton(exKey, setIndex) {
  // Cheapest: re-render the whole day view to refresh button labels & stats.
  const w = activeDayState.week, d = activeDayState.day;
  renderDay(w, d);
}

function persistDayState() {
  // Only persist exercises that have actually been touched (logged sets or
  // user-modified weight) so empty rows from the pre-fill don't bloat storage.
  const clean = {};
  Object.entries(activeDayState.exercises).forEach(([id, ex]) => {
    const hasLoggedSet = (ex.sets || []).length > 0;
    const weightTouched = ex.actualWeight != null && ex.actualWeight !== ex.plannedWeight;
    if (hasLoggedSet || weightTouched) clean[id] = ex;
  });
  Storage.upsertSession(activeDayState.dateISO, {
    week: activeDayState.week,
    day: activeDayState.day,
    startedAt: activeDayState.startedAt || null,
    completedAt: activeDayState.completedAt || null,
    warmup: activeDayState.warmup || null,
    exercises: clean,
    cardio: activeDayState.cardio || null,
  });
}

/* ════════════════════════════════════════════════════════════════
   VIEW: HISTORY
   ════════════════════════════════════════════════════════════════ */
function renderHistory() {
  const pid = Storage.getActiveProfile();
  const profiles = Storage.getProfiles();
  document.getElementById('topbar-title').textContent = 'History';
  document.getElementById('topbar-sub').textContent = profiles[pid]?.name || '';

  const view = document.getElementById('view');
  const sessions = Storage.listSessions();
  if (sessions.length === 0) {
    view.innerHTML = `<div class="empty">No sessions logged yet. Complete a workout to see history here.</div>`;
    return;
  }
  const html = sessions.map(s => {
    const d = dayDef(s.day);
    const name = d ? d.name : `Day ${s.day}`;
    const isStrength = d && d.type === 'strength';
    const isCardio   = d && d.type === 'cardio';
    let topLine = '';
    if (isStrength) {
      topLine = Object.entries(s.exercises || {})
        .filter(([, ex]) => ex.actualWeight != null)
        .map(([id, ex]) => {
          const exName = findExerciseName(id) || id;
          return `${exName} ${ex.actualWeight}kg`;
        })
        .slice(0, 3)
        .join(' · ');
    } else if (isCardio && s.cardio && s.cardio.startedAt && s.cardio.endedAt) {
      const durSec = Math.round((s.cardio.endedAt - s.cardio.startedAt) / 1000);
      const km     = ((s.cardio.distanceMeters || 0) / 1000).toFixed(2);
      topLine = `${km} km · ${fmtTime(durSec)}`;
      if (s.cardio.hrAvg) topLine += ` · ♥ avg ${s.cardio.hrAvg}`;
    } else {
      topLine = d ? d.type : '';
    }
    const setCount = Object.values(s.exercises || {}).reduce(
      (sum, ex) => sum + ((ex.sets || []).filter(x => x.endedAt).length), 0
    );
    return `
      <details class="hist-row">
        <summary>
          <div>
            <div class="h-date">${escapeHtml(fmtDateShort(s.date))} <span class="h-tag">W${s.week} · D${s.day}</span></div>
            <div class="h-sub">${escapeHtml(name)}${setCount ? ' · ' + setCount + ' sets' : ''}</div>
            ${topLine ? `<div class="h-sub" style="margin-top: 4px;">${escapeHtml(topLine)}</div>` : ''}
          </div>
          <span class="text-xs text-muted">▾</span>
        </summary>
        <div class="hist-detail">${renderHistoryDetail(s)}</div>
        <div class="hist-actions">
          <button class="btn danger sm hist-delete-btn" data-date="${escapeHtml(s.date)}">Delete record</button>
        </div>
      </details>
    `;
  }).join('');
  view.innerHTML = html;

  view.querySelectorAll('.hist-delete-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const date = btn.dataset.date;
      if (!confirm(`Delete record for ${fmtDateShort(date)}? This cannot be undone.`)) return;
      Storage.deleteSession(date);
      renderHistory();
    });
  });
}

function findExerciseName(id) {
  for (const d of getActiveProgram().days) {
    if (!d.blocks) continue;
    for (const b of d.blocks) {
      if (!b.exercises) continue;
      for (const ex of b.exercises) {
        if (ex.id === id) return ex.name;
      }
    }
  }
  return null;
}

function renderHistoryDetail(s) {
  // Cardio sessions get their own summary block
  if (s.cardio && s.cardio.startedAt) {
    const durSec = s.cardio.endedAt
      ? Math.round((s.cardio.endedAt - s.cardio.startedAt) / 1000) : null;
    const km = ((s.cardio.distanceMeters || 0) / 1000).toFixed(2);
    const pace = (s.cardio.distanceMeters > 10 && durSec)
      ? fmtTime(Math.round(durSec / (s.cardio.distanceMeters / 1000)))
      : '—';
    const hrHtml = s.cardio.hrAvg != null
      ? `<div class="h-hr">♥ avg ${s.cardio.hrAvg} · max ${s.cardio.hrMax} · min ${s.cardio.hrMin}</div>` : '';
    return `<div class="h-ex">
      <span class="h-ex-name">Cardio</span>
      <span class="h-sets">${km} km${durSec ? ' · ' + fmtTime(durSec) : ''}${s.cardio.distanceMeters > 10 ? ' · ' + pace + '/km' : ''}</span>
      ${hrHtml}
    </div>`;
  }

  const entries = Object.entries(s.exercises || {});
  let warmupHtml = '';
  if (s.warmup && s.warmup.startedAt && s.warmup.endedAt) {
    const dur = Math.round((s.warmup.endedAt - s.warmup.startedAt) / 1000);
    const wHr = s.warmup.hrAvg != null
      ? `<div class="h-hr">♥ avg ${s.warmup.hrAvg} max ${s.warmup.hrMax}</div>` : '';
    warmupHtml = `<div class="h-ex"><span class="h-ex-name">Warm-up</span> <span class="h-sets">${fmtTime(dur)}</span>${wHr}</div>`;
  }
  if (!entries.length && !warmupHtml) return '<div class="text-xs text-muted">No exercises logged.</div>';
  return warmupHtml + entries.map(([id, ex]) => {
    const name = findExerciseName(id) || id;
    const setsTxt = (ex.sets || [])
      .filter(x => x.endedAt)
      .sort((a, b) => a.setIndex - b.setIndex)
      .map(x => {
        const dur  = Math.round((x.endedAt - x.startedAt) / 1000);
        const rest = x.restSeconds != null ? ` r${x.restSeconds}s` : '';
        const rpe  = x.rpe != null ? ` @${x.rpe}` : '';
        const hr   = x.hrAvg != null ? ` ♥${x.hrAvg}↑${x.hrMax}` : '';
        const rhr  = x.restHrAvg != null ? ` rest♥${x.restHrAvg}` : '';
        return `S${x.setIndex}:${fmtTime(dur)}${rest}${rpe}${hr}${rhr}`;
      }).join('  ');
    return `<div class="h-ex">
      <span class="h-ex-name">${escapeHtml(name)}</span>
      ${ex.actualWeight != null ? `<span class="h-sets">${ex.actualWeight}kg</span>` : ''}
      ${setsTxt ? `<div class="h-sets" style="margin-left: 0; display: block; margin-top: 2px;">${escapeHtml(setsTxt)}</div>` : ''}
    </div>`;
  }).join('');
}

/* ════════════════════════════════════════════════════════════════
   VIEW: HEALTH  (doctor visits + health reports)
   ════════════════════════════════════════════════════════════════ */
function renderHealth() {
  const pid = Storage.getActiveProfile();
  const profiles = Storage.getProfiles();
  const profileName = profiles[pid]?.name || pid;
  const visits = Storage.getDoctorVisits();
  const reports = Storage.getHealthReports();

  document.getElementById('topbar-title').textContent = 'Health';
  document.getElementById('topbar-sub').textContent = profileName;

  const view = document.getElementById('view');
  view.innerHTML = `
    <div class="section-header">
      <h2>Doctor Visits</h2>
      <button class="btn sm" id="add-visit-btn">+ Add</button>
    </div>
    ${visits.length === 0
      ? '<div class="empty">No doctor visits recorded yet.</div>'
      : visits.map(v => renderDoctorVisitCard(v)).join('')}

    <div class="section-header" style="margin-top:16px;">
      <h2>Health Reports</h2>
      <button class="btn sm" id="add-report-btn">+ Add</button>
    </div>
    ${reports.length === 0
      ? '<div class="empty">No health reports recorded yet.</div>'
      : reports.map(r => renderHealthReportCard(r)).join('')}
  `;

  document.getElementById('add-visit-btn').onclick = () => showAddVisitSheet();
  document.getElementById('add-report-btn').onclick = () => showAddReportSheet();

  view.querySelectorAll('.delete-visit-btn').forEach(btn => {
    btn.onclick = () => {
      if (confirm('Delete this doctor visit?')) {
        Storage.deleteDoctorVisit(btn.dataset.id);
        renderHealth();
      }
    };
  });
  view.querySelectorAll('.delete-report-btn').forEach(btn => {
    btn.onclick = () => {
      if (confirm('Delete this health report?')) {
        Storage.deleteHealthReport(btn.dataset.id);
        renderHealth();
      }
    };
  });
}

function renderDoctorVisitCard(v) {
  return `
    <details class="hist-row">
      <summary>
        <div>
          <div class="h-date">${escapeHtml(fmtDateShort(v.date))}${v.specialty ? ` <span class="h-tag">${escapeHtml(v.specialty)}</span>` : ''}</div>
          <div class="h-sub">${escapeHtml(v.doctor || 'Unknown doctor')}${v.reason ? ' · ' + escapeHtml(v.reason) : ''}</div>
        </div>
        <span class="text-xs text-muted">▾</span>
      </summary>
      <div class="hist-detail">
        ${v.notes ? `<div style="margin-bottom:8px;white-space:pre-wrap;">${escapeHtml(v.notes)}</div>` : ''}
        ${v.followUp ? `<div class="text-sm text-muted" style="margin-bottom:8px;">Follow-up: <strong>${escapeHtml(fmtDate(v.followUp))}</strong></div>` : ''}
        <button class="btn danger sm delete-visit-btn" data-id="${escapeHtml(v.id)}">Delete</button>
      </div>
    </details>`;
}

function renderHealthReportCard(r) {
  const kvEntries = Object.entries(r.values || {});
  const kvPreview = kvEntries.slice(0, 3).map(([k, v]) => escapeHtml(k) + ': ' + escapeHtml(v)).join(' · ');
  return `
    <details class="hist-row">
      <summary>
        <div>
          <div class="h-date">${escapeHtml(fmtDateShort(r.date))}${r.type ? ` <span class="h-tag">${escapeHtml(r.type)}</span>` : ''}</div>
          <div class="h-sub">${escapeHtml(r.title || 'Untitled report')}</div>
          ${kvPreview ? `<div class="h-sub" style="margin-top:4px;">${kvPreview}</div>` : ''}
        </div>
        <span class="text-xs text-muted">▾</span>
      </summary>
      <div class="hist-detail">
        ${r.notes ? `<div style="margin-bottom:8px;white-space:pre-wrap;">${escapeHtml(r.notes)}</div>` : ''}
        ${kvEntries.length > 0 ? `
          <div class="kv-display" style="margin-bottom:8px;">
            ${kvEntries.map(([k, v]) => `
              <div class="kv-display-row">
                <span class="kv-label">${escapeHtml(k)}</span>
                <span class="kv-val">${escapeHtml(v)}</span>
              </div>`).join('')}
          </div>` : ''}
        <button class="btn danger sm delete-report-btn" data-id="${escapeHtml(r.id)}">Delete</button>
      </div>
    </details>`;
}

/* ── Modal helpers ─────────────────────────────────────────────── */
function showModal(bodyHtml, title) {
  const backdrop = document.getElementById('modal-backdrop');
  const sheet = document.getElementById('modal-sheet');
  sheet.innerHTML = `
    <div class="modal-header">
      <h3>${escapeHtml(title)}</h3>
      <button class="iconbtn" id="modal-close">✕</button>
    </div>
    <div>${bodyHtml}</div>`;
  backdrop.hidden = false;
  sheet.hidden = false;
  document.getElementById('modal-close').onclick = closeModal;
  backdrop.onclick = closeModal;
}

function closeModal() {
  document.getElementById('modal-backdrop').hidden = true;
  document.getElementById('modal-sheet').hidden = true;
}

function showAddVisitSheet() {
  showModal(`
    <div class="field">
      <label>Date</label>
      <input type="date" id="v-date" value="${todayISO()}">
    </div>
    <div class="field">
      <label>Doctor name</label>
      <input type="text" id="v-doctor" placeholder="Dr. Smith">
    </div>
    <div class="field">
      <label>Specialty</label>
      <select id="v-specialty">
        <option value="GP">GP / General Practice</option>
        <option value="Cardiologist">Cardiologist</option>
        <option value="Dentist">Dentist</option>
        <option value="Dermatologist">Dermatologist</option>
        <option value="Physiotherapist">Physiotherapist</option>
        <option value="Specialist">Specialist</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="field">
      <label>Reason for visit</label>
      <input type="text" id="v-reason" placeholder="Annual checkup, follow-up…">
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="v-notes" rows="3" placeholder="Findings, blood pressure, recommendations…"></textarea>
    </div>
    <div class="field">
      <label>Follow-up date <span class="text-muted text-xs">(optional)</span></label>
      <input type="date" id="v-followup">
    </div>
    <button class="btn block mt-2" id="save-visit-btn">Save visit</button>
  `, 'Add Doctor Visit');

  document.getElementById('save-visit-btn').onclick = () => {
    const date = document.getElementById('v-date').value;
    if (!date) { alert('Please enter a date.'); return; }
    Storage.addDoctorVisit({
      date,
      doctor:    document.getElementById('v-doctor').value.trim(),
      specialty: document.getElementById('v-specialty').value,
      reason:    document.getElementById('v-reason').value.trim(),
      notes:     document.getElementById('v-notes').value.trim(),
      followUp:  document.getElementById('v-followup').value || null,
    });
    closeModal();
    renderHealth();
  };
}

function showAddReportSheet() {
  showModal(`
    <div class="field">
      <label>Date</label>
      <input type="date" id="r-date" value="${todayISO()}">
    </div>
    <div class="field">
      <label>Type</label>
      <select id="r-type">
        <option value="Blood Test">Blood Test</option>
        <option value="Imaging">Imaging (X-ray, MRI, etc.)</option>
        <option value="Checkup">Checkup / Physical</option>
        <option value="Specialist Report">Specialist Report</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="r-title" placeholder="Annual Blood Panel">
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="r-notes" rows="3" placeholder="Summary, findings, doctor's comments…"></textarea>
    </div>
    <div class="field">
      <label>Key metrics <span class="text-muted text-xs">(optional)</span></label>
      <div id="kv-list" class="kv-list"></div>
      <button class="btn secondary sm mt-1" id="add-kv-btn">+ Add metric</button>
    </div>
    <button class="btn block mt-2" id="save-report-btn">Save report</button>
  `, 'Add Health Report');

  document.getElementById('add-kv-btn').onclick = () => {
    const list = document.getElementById('kv-list');
    const row = document.createElement('div');
    row.className = 'kv-row';
    row.innerHTML = `
      <input type="text" class="kv-name" placeholder="e.g. Cholesterol">
      <input type="text" class="kv-value" placeholder="4.2 mmol/L">
      <button class="btn ghost sm kv-remove" style="color:var(--red);padding:0 8px;">✕</button>`;
    row.querySelector('.kv-remove').onclick = () => row.remove();
    list.appendChild(row);
  };

  document.getElementById('save-report-btn').onclick = () => {
    const date = document.getElementById('r-date').value;
    if (!date) { alert('Please enter a date.'); return; }
    const values = {};
    document.querySelectorAll('#modal-sheet .kv-row').forEach(row => {
      const name = row.querySelector('.kv-name').value.trim();
      const val  = row.querySelector('.kv-value').value.trim();
      if (name) values[name] = val;
    });
    Storage.addHealthReport({
      date,
      type:   document.getElementById('r-type').value,
      title:  document.getElementById('r-title').value.trim(),
      notes:  document.getElementById('r-notes').value.trim(),
      values,
    });
    closeModal();
    renderHealth();
  };
}

  const pid = Storage.getActiveProfile();

   INIT
   ════════════════════════════════════════════════════════════════ */
window.go = go;
window.Tracker = { Timer, Storage, HeartRate };
Timer.init(document.getElementById('timer-bar'));

migrateIfNeeded();
Storage.load(); // ensure profile data is initialised
updateProfileSwitcherUI();

// Profile switcher toggle
document.getElementById('profile-switcher').addEventListener('click', () => {
  const current = Storage.getActiveProfile();
  Storage.setActiveProfile(current === 'p1' ? 'p2' : 'p1');
  updateProfileSwitcherUI();
  route();
});

// Register separate service worker (does not conflict with finance app's sw.js)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/health/sw-tracker.js', { scope: '/health/tracker.html' })
    .catch(e => console.warn('SW registration failed:', e));
}

if (!location.hash) location.hash = '/today';
route();

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) Timer.render();
});

// ── Heart-rate UI wiring ──────────────────────────────────────
(function () {
  const badge      = document.getElementById('hr-badge');
  const bpmSpan    = document.getElementById('hr-bpm');
  const connectBtn = document.getElementById('hr-connect-btn');

  function setConnected(on) {
    badge.hidden = !on;
    connectBtn.textContent = '♥';
    connectBtn.classList.toggle('connected', on);
  }

  window.addEventListener('hr:reading', e => {
    bpmSpan.textContent = e.detail.bpm;
    const cardioEl = document.getElementById('cardio-hr-num');
    if (cardioEl) cardioEl.textContent = e.detail.bpm;
    _cardioUpdateZone(e.detail.bpm);
  });
  window.addEventListener('hr:connected', () => {
    setConnected(true);
    const cardioEl = document.getElementById('cardio-hr-num');
    if (cardioEl && HeartRate.latest() != null) cardioEl.textContent = HeartRate.latest();
  });
  window.addEventListener('hr:disconnected', () => {
    setConnected(false);
    const cardioEl = document.getElementById('cardio-hr-num');
    if (cardioEl) cardioEl.textContent = '--';
  });

  connectBtn.addEventListener('click', () => {
    if (HeartRate.isConnected()) {
      HeartRate.disconnect();
    } else {
      HeartRate.connect();
    }
  });
})();
